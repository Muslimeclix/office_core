include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  language:
    # Keep public_member_api_docs as a hint, not a hard error.
    # Documentation is added incrementally; missing docs should not block
    # the build or PRs.
    strict-casts: false
    strict-inference: false
    strict-raw-types: false

linter:
  rules:
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_fields: true
    prefer_final_locals: true
    avoid_print: false  # OfficeLogger uses print intentionally
    # Disable public_member_api_docs — it's a docs-quality hint, not a
    # correctness issue. Enable manually when running pub.dev scoring checks.
    public_member_api_docs: false
    lines_longer_than_80_chars: false
    # Avoid noisy style rules that don't catch bugs.
    avoid_redundant_argument_values: false
    sort_constructors_first: false
    sort_unnamed_constructors_first: false
