name: office_core
description: "A federated Flutter plugin for Remote Config, Ads, Crashlytics, Analytics, Notifications, and Trial/Limits, powered by a single initialize() API."
version: 1.1.1
homepage: https://github.com/Muslimeclix/office_core
repository: https://github.com/Muslimeclix/office_core
issue_tracker: https://github.com/Muslimeclix/office_core/issues
documentation: https://github.com/Muslimeclix/office_core#readme

topics:
  - remote-config
  - ads
  - crashlytics
  - analytics
  - notifications

# screenshots:
#   - description: "OfficeCore architecture overview"
#     path: docs/architecture.png

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase stack
  firebase_core: ^4.11.0
  firebase_remote_config: ^6.5.3
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3
  firebase_messaging: ^16.4.1
  firebase_database: ^12.4.4

  # Ads
  google_mobile_ads: ^9.0.0

  # Notifications
  flutter_local_notifications: ^22.0.1

  # Utilities
  internet_connection_checker_plus: ^3.1.1
  shared_preferences: ^2.3.2
  package_info_plus: ^10.2.0
  flutter_udid: ^4.1.4
  permission_handler: ^12.0.3
  shimmer: ^3.0.0
  dio: ^5.7.0

  # State management (optional — used by GetX adapter)
  # GetX is NOT required; the plugin uses ChangeNotifier internally.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  plugin:
    platforms:
      android:
        default_package: office_core
      ios:
        default_package: office_core
      macos:
        default_package: office_core
      windows:
        default_package: office_core
